<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bank of Veyda</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, sans-serif;
      background: #0b1220;
      color: #f7f7fb;
    }
    body { margin: 0; min-height: 100vh; }
    .page-shell { max-width: 1120px; margin: 0 auto; padding: 2rem; }
    .site-header { display: flex; justify-content: space-between; align-items: center; gap: 1rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .site-title { font-size: 1.75rem; color: #fff; text-decoration: none; }
    .nav-links a { color: #c7d2fe; text-decoration: none; margin-left: 1rem; }
    .panel { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); border-radius: 1rem; padding: 1.5rem; margin-top: 1.5rem; }
    .button { display: inline-block; text-decoration: none; color: #fff; background: #4f46e5; border-radius: 999px; padding: 0.9rem 1.3rem; }
    input, textarea, select { width: 100%; padding: 0.85rem; border-radius: 0.85rem; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.05); color: #f7f7fb; margin-top: 0.5rem; }
    label { display: block; margin-top: 1rem; font-weight: 600; }
    .form-errors { color: #fca5a5; margin: 0.75rem 0; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { padding: 0.85rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,.08); }
    th { color: #a5b4fc; }
    footer { margin-top: 2rem; color: #94a3b8; font-size: 0.95rem; }
    .badge { display: inline-flex; align-items: center; gap: .5rem; padding: .5rem 1rem; border-radius: 999px; background: rgba(79, 70, 229, .16); color: #c7d2fe; }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <a class="site-title" href="{% url 'dashboard' %}">Bank of Veyda</a>
      <nav class="nav-links">
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'request_account' %}">Request account</a>
        <a href="{% url 'compliance' %}">Compliance</a>
        {% if user.is_authenticated %}
          <span class="badge">{{ user.username }}</span>
          <a href="{% url 'logout' %}">Sign out</a>
        {% else %}
          <a href="{% url 'login' %}">Sign in</a>
          <a href="{% url 'signup' %}">Sign up</a>
        {% endif %}
      </nav>
    </header>

    {% block content %}{% endblock %}

    <footer>
      Bank of Veyda · Python Django fintech simulation.
    </footer>
  </div>
</body>
</html>
