{% extends 'base.html' %}

{% block content %}
  <div class="panel">
    <h1>Password reset</h1>
    <p>Enter your email address and we'll send password reset instructions.</p>
    <form method="post">
      {% csrf_token %}
      {{ form.email.label_tag }}
      {{ form.email }}
      {{ form.email.errors }}
      <button class="button" type="submit">Send reset email</button>
    </form>
  </div>
{% endblock %}
